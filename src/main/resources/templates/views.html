<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sudoku Solver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Đang giải Sudoku...</div>
    <div class="loading-sub">Vui lòng chờ trong giây lát</div>
</div>

<h1>Sudoku Solver Machine</h1>
<p>- Nhập số vào các ô bên dưới</p>
<p>- Bấm nút <strong>Giải</strong>, chờ máy xử lý</p>
<p>- Ô màu xanh lá là ô do máy tự điền</p>
<br>

<form action="/" method="post" id="sudoku-form">
    <table>
        <tr th:each="row, rowStat : ${#numbers.sequence(0, 8)}">
            <td th:each="col, colStat : ${#numbers.sequence(0, 8)}">
                <input type="number" min="1" max="9"
                       th:name="|cell_${row}_${col}|"
                       th:value="${board != null and board[row][col] != 0 ? board[row][col] : ''}"
                       th:data-original="${originalBoard != null and originalBoard[row][col] != 0 ? originalBoard[row][col] : '0'}"
                       th:classappend="${board != null
                           and board[row][col] != 0
                           and (originalBoard == null or originalBoard[row][col] == 0)
                           ? 'solved' : ''}">
            </td>
        </tr>
    </table>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" id="solve-btn">⚡ Giải</button>
        <a href="/" class="btn btn-secondary">🗑 Xóa</a>
    </div>
</form>

<script>
    document.getElementById('sudoku-form').addEventListener('submit', function () {
        document.getElementById('loading-overlay').classList.add('show');
        document.getElementById('solve-btn').disabled = true;
    });
</script>

</body>
</html>
