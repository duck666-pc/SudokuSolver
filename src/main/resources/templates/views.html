<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sudoku Solver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }

        h1 { font-size: 1.8rem; font-weight: bold; }
        p  { margin: 2px 0; color: #555; }

        table { border-collapse: collapse; margin: 16px 0; }
        td    { padding: 2px; }

        input[type=number] {
            width: 44px; height: 44px;
            text-align: center; font-size: 20px; font-weight: bold;
            border: 1px solid #aaa;
            border-radius: 4px;
            outline: none;
            background: #fff;
            color: #222;
            transition: background 0.2s;
        }
        input[type=number]:focus { background: #e8f4ff; }

        /* Viền box 3x3 */
        td:nth-child(3n) input { border-right: 3px solid #333; }
        tr:nth-child(3n) td input { border-bottom: 3px solid #333; }

        /* Ô do máy giải — highlight xanh lá */
        input.solved {
            background: #d4edda;
            color: #155724;
        }

        /* Loading overlay */
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.75);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        #loading-overlay.show { display: flex; }

        .spinner {
            width: 60px; height: 60px;
            border: 6px solid #dee2e6;
            border-top-color: #0d6efd;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { font-size: 1.2rem; color: #444; font-weight: 500; }
        .loading-sub  { font-size: 0.9rem; color: #888; }
    </style>
</head>
<body class="container py-4">

<!-- Loading Overlay -->
<div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Đang giải Sudoku...</div>
    <div class="loading-sub">Vui lòng chờ trong giây lát</div>
</div>

<h1>🧩 Sudoku Solver Machine</h1>
<p>- Nhập số vào các ô bên dưới</p>
<p>- Bấm nút <strong>Giải</strong>, chờ máy xử lý</p>
<p>- Ô màu xanh lá là ô do máy tự điền</p>
<br>

<form action="/solve" method="post" id="sudoku-form">
    <table>
        <tr th:each="row, rowStat : ${#numbers.sequence(0, 8)}">
            <td th:each="col, colStat : ${#numbers.sequence(0, 8)}">
                <!--
                    Lưu giá trị gốc vào data-original để JS phân biệt
                    ô người dùng nhập vs ô máy giải sau khi submit
                -->
                <input type="number" min="1" max="9"
                       th:name="|cell_${row}_${col}|"
                       th:value="${board != null and board[row][col] != 0 ? board[row][col] : ''}"
                       th:data-original="${originalBoard != null and originalBoard[row][col] != 0 ? originalBoard[row][col] : '0'}"
                       th:classappend="${board != null
                           and board[row][col] != 0
                           and (originalBoard == null or originalBoard[row][col] == 0)
                           ? 'solved' : ''}">
            </td>
        </tr>
    </table>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" id="solve-btn">⚡ Giải</button>
        <a href="/" class="btn btn-secondary">🗑 Xóa</a>
    </div>
</form>

<script>
    document.getElementById('sudoku-form').addEventListener('submit', function () {
        document.getElementById('loading-overlay').classList.add('show');
        document.getElementById('solve-btn').disabled = true;
    });
</script>

</body>
</html>
