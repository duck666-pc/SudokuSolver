<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sudoku Solver</title>
    <style>
        table { border-collapse: collapse; }
        td { border: 1px solid #999; }
        td:nth-child(3n) { border-right: 3px solid #000; }
        tr:nth-child(3n) td { border-bottom: 3px solid #000; }
        input { width: 40px; height: 40px; text-align: center; font-size: 1.2rem; border: none; }
    </style>
</head>
<body>

<p th:if="${error}" th:text="${error}" style="color:red"></p>

<form action="/" method="post" id="form">
    <table>
        <tr th:each="row : ${#numbers.sequence(0,8)}">
            <td th:each="col : ${#numbers.sequence(0,8)}">
                <input type="text" inputmode="numeric" maxlength="1"
                       th:name="|cell_${row}_${col}|"
                       th:value="${board != null and board[row][col] != 0 ? board[row][col] : ''}">
            </td>
        </tr>
    </table>
    <br>
    <button type="submit">Giải</button>
    <a href="/"><button type="button">Xóa</button></a>
</form>

</body>
</html>
