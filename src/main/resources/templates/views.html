<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        table { border-collapse: collapse; }
        td { padding: 2px; }
        input {
            width: 40px; height: 40px;
            text-align: center; font-size: 18px;
        }
        td:nth-child(3n) input { border-right: 3px solid black; }
        tr:nth-child(3n) td input { border-bottom: 3px solid black; }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<h1>Sudoku Solver Machine</h1> <br>
<h2>Cảm ơn vì đã chọn Sudoku Solver Machine, đây là cách sử dụng chương trình:</h2> <br>
<h2>-Nhập số "Giải" phía dưới</h2> <br>
<h2>-Bấm nút giải, chờ đợi 1 chút và copy kết quả</h2> <br>
<h2>-Nếu có nhiều đáp án sẽ hiện thị số trang đáp án kèm nút di chuyển phía dưới</h2> <br>
<table>
    <tr th:each="row : ${#numbers.sequence(0, 8)}" >
        <td th:each="col : ${#numbers.sequence(0, 8)}">
            <input type="number" min="1" max="9"
                   th:name="|cell_${row}_${col}|"
                   th:value="${board != null ? board[row][col] : ''}">
        </td>
    </tr>
</table>
<button type="submit">Giải</button>
</body>
</html>
